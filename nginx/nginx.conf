# ════════════════════════════════════════════════════════════════
# LuxQuant Terminal — Nginx reference config (documents the LIVE setup)
#
# This mirrors the working production server block on the VPS
# (/etc/nginx/sites-enabled/luxquant.tw). Kept in the repo so the config
# isn't lost on a server rebuild. Adapt the proxy/SSL blocks to your host.
#
# KEY SEO-CRITICAL DIRECTIVE:
#   try_files $uri $uri/index.html /index.html;
#   → serves the prerendered per-route files (dist/learn/*, /blog/*, /coins/*)
#     for crawlers, and falls back to the SPA index.html for app routes.
#   Do NOT revert to `try_files $uri $uri/ /index.html;` — that depends on the
#   `index` directive resolving directory→index and was serving the wrong file.
# ════════════════════════════════════════════════════════════════

# ── HTTP → HTTPS + www → apex (single canonical host: luxquant.tw) ──
server {
    listen 80;
    listen [::]:80;
    server_name luxquant.tw www.luxquant.tw;
    return 301 https://luxquant.tw$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.luxquant.tw;
    # SSL certs managed on the host (certbot / Cloudflare origin cert)
    # ssl_certificate     /etc/letsencrypt/live/luxquant.tw/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/luxquant.tw/privkey.pem;
    return 301 https://luxquant.tw$request_uri;   # www → apex (canonical)
}

# ── Main site ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name luxquant.tw;

    root /var/www/luxquantdata;
    index index.html;

    # ssl_certificate     /etc/letsencrypt/live/luxquant.tw/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/luxquant.tw/privkey.pem;

    # gzip (nginx). Brotli usually handled by Cloudflare in front.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    # Long-cache immutable hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SEO files — always fresh
    location = /sitemap.xml { add_header Cache-Control "public, max-age=3600"; }
    location = /robots.txt  { add_header Cache-Control "public, max-age=3600"; }

    # API → backend (adjust upstream to your gunicorn port, e.g. 8002)
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA + prerendered content pages.
    # $uri/index.html serves dist/<route>/index.html when it exists (prerender),
    # otherwise /index.html boots the SPA for client-side routing.
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
