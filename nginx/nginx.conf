# ════════════════════════════════════════════════════════════════
# LuxQuant Terminal — Nginx site config (mirrors LIVE production)
#
# Live location on the VPS: /etc/nginx/sites-enabled/luxquant.tw
# Kept in the repo so the config isn't lost on a server rebuild.
# TLS is terminated by Cloudflare in front, so this block is HTTP :80 only.
#
# SEO-CRITICAL — do NOT change:
#   try_files $uri $uri/index.html /index.html;
#   → serves the prerendered per-route files (dist/learn/*, /blog/*, /coins/*)
#     to crawlers, and falls back to the SPA index.html for app routes.
#   Reverting to `$uri/` (without /index.html) breaks prerendered pages.
#
# NOTE: keep nginx backups OUTSIDE sites-enabled/ (e.g. /root/nginx-backups),
# because nginx loads EVERY file in sites-enabled/* — a stray *.bak there
# causes a "conflicting server name" warning.
# ════════════════════════════════════════════════════════════════

# Prefer non-www canonical host for SEO (www → luxquant.tw).
server {
    listen 80;
    server_name www.luxquant.tw;
    return 301 https://luxquant.tw$request_uri;
}

server {
    listen 80;
    server_name luxquant.tw;
    root /var/www/luxquantdata;
    index index.html;
    client_max_body_size 5M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/x-javascript application/xml application/xml+rss application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml image/x-icon;

    # ── Static asset aliases (generated media served from disk) ──
    location ^~ /api/v1/charts/ {
        alias /opt/luxquant/screenshots/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Access-Control-Allow-Origin *;
    }
    location ^~ /api/v1/avatars/ {
        alias /opt/luxquant/avatars/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Access-Control-Allow-Origin *;
    }
    location ^~ /api/v1/cards/ {
        alias /opt/luxquant/pnl-cards/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Access-Control-Allow-Origin *;
    }

    # ── Backend API (FastAPI / gunicorn) ──
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 6s;
    }

    # ── WebSocket ──
    location ^~ /ws/ {
        proxy_pass http://127.0.0.1:8002/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Immutable hashed frontend assets ──
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # ── Cryptobot backend ──
    location ^~ /cryptobot/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── OG preview for crawlers on /signals?signal=<id> ──
    # Social bots get server-rendered meta-tag HTML; humans get the SPA.
    location = /signals {
        proxy_set_header Host $host;
        if ($http_user_agent ~* "(facebookexternalhit|Facebot|Twitterbot|TelegramBot|WhatsApp|Slackbot|LinkedInBot|Discordbot|Pinterest|redditbot|Googlebot|bingbot|Applebot|vkShare|W3C_Validator|Embedly|Iframely|SkypeUriPreview)") {
            proxy_pass http://127.0.0.1:8002/api/v1/og/signal/$arg_signal?ref=$arg_ref;
        }
        try_files $uri $uri/index.html /index.html;
    }

    # ── SPA + prerendered content pages (/learn, /blog, /coins) ──
    location / {
        try_files $uri $uri/index.html /index.html;
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
}
