<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0506" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="preconnect" href="https://unpkg.com" />

    <!-- Search / browser favicon = dedicated SEO logo (/favicon.png) with its
         own background so it's visible on Google's white results page.
         The in-app UI still uses /logo.png (unchanged). -->
    <link rel="icon" type="image/png" sizes="any" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://luxquant.tw/" />

    <!-- ════════════════════════════════════════════════
         PRIMARY SEO
         ════════════════════════════════════════════════ -->
    <title>LuxQuant Terminal: Crypto Market Intelligence &amp; Analytics</title>
    <meta
      name="description"
      content="LuxQuant Terminal turns market data into a quantitative edge with algorithmic analysis, on-chain intelligence, and risk scoring. Trade smarter, with confidence. Informed by data, decided by you."
    />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="LuxQuant" />

    <!-- ════════════════════════════════════════════════
         OPEN GRAPH (WhatsApp / Telegram / Discord / FB / LinkedIn)
         ════════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LuxQuant Terminal" />
    <meta property="og:title" content="LuxQuant Terminal: Crypto Market Intelligence &amp; Analytics" />
    <meta
      property="og:description"
      content="Turn market data into a quantitative edge with algorithmic analysis, on-chain intelligence, and risk scoring. Bull or bear, informed by data and decided by you."
    />
    <meta property="og:url" content="https://luxquant.tw/" />
    <meta property="og:image" content="https://luxquant.tw/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LuxQuant Terminal — algorithmic crypto trading" />
    <meta property="og:locale" content="en_US" />

    <!-- ════════════════════════════════════════════════
         TWITTER / X
         ════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@luxquantcrypto" />
    <meta name="twitter:title" content="LuxQuant Terminal: Crypto Market Intelligence &amp; Analytics" />
    <meta
      name="twitter:description"
      content="Crypto market intelligence and analytics. Bull or bear, informed by data and decided by you."
    />
    <meta name="twitter:image" content="https://luxquant.tw/og-default.png" />

    <!-- ════════════════════════════════════════════════
         STRUCTURED DATA (JSON-LD)
         Helps Google show the logo and understand the product;
         a prerequisite for earning sitelinks over time.
         ════════════════════════════════════════════════ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://luxquant.tw/#organization",
            "name": "LuxQuant",
            "url": "https://luxquant.tw/",
            "logo": "https://luxquant.tw/logo.png",
            "sameAs": ["https://x.com/luxquantcrypto"]
          },
          {
            "@type": "WebSite",
            "@id": "https://luxquant.tw/#website",
            "name": "LuxQuant Terminal",
            "url": "https://luxquant.tw/",
            "publisher": { "@id": "https://luxquant.tw/#organization" }
          },
          {
            "@type": "SoftwareApplication",
            "name": "LuxQuant Terminal",
            "applicationCategory": "FinanceApplication",
            "operatingSystem": "Web",
            "url": "https://luxquant.tw/",
            "description": "A quantitative crypto trading terminal with algorithmic signals, risk scoring, on-chain intelligence, AI research, and automated execution.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD",
              "description": "Free tier available; premium tiers unlock signals, AutoTrade, on-chain intelligence, and AI research."
            }
          }
        ]
      }
    </script>

    <script async src="https://telegram.org/js/telegram-widget.js?22"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ════════════════════════════════════════════════
         INSTANT PRE-BOOT LOADER (zero-JS)
         Paints immediately — before the JS bundle loads — so users never
         see a blank screen. Visually identical to the React <LoadingScreen>
         so the handoff is seamless. React replaces #root on mount, which
         removes this automatically.
         ════════════════════════════════════════════════ -->
    <style>
      #lq-preboot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0506;z-index:2147483000;font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;}
      #lq-preboot .lqp-glow{position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(212,168,83,.13) 0%,transparent 62%);filter:blur(6px);}
      #lq-preboot .lqp-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:24px;}
      #lq-preboot .lqp-emblem{position:relative;width:72px;height:72px;}
      #lq-preboot .lqp-ring,#lq-preboot .lqp-ring2{position:absolute;inset:0;border-radius:50%;box-sizing:border-box;}
      #lq-preboot .lqp-ring{border:2px solid rgba(212,168,83,.13);}
      #lq-preboot .lqp-ring2{border:2px solid transparent;border-top-color:#d4a853;border-right-color:rgba(212,168,83,.6);animation:lqp-spin .9s linear infinite;}
      #lq-preboot .lqp-logo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;animation:lqp-breathe 2.4s ease-in-out infinite;}
      #lq-preboot .lqp-logo img{width:34px;height:34px;object-fit:contain;}
      #lq-preboot .lqp-txt{display:flex;flex-direction:column;align-items:center;gap:12px;}
      #lq-preboot .lqp-word{color:#efe7dd;font-size:13px;letter-spacing:.42em;text-indent:.42em;font-weight:600;text-transform:uppercase;}
      #lq-preboot .lqp-bar{position:relative;width:140px;height:2px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden;}
      #lq-preboot .lqp-bar span{position:absolute;top:0;bottom:0;width:40%;border-radius:2px;background:linear-gradient(90deg,transparent,#d4a853,transparent);animation:lqp-slide 1.15s ease-in-out infinite;}
      #lq-preboot .lqp-label{color:#6b5c52;font-size:10px;letter-spacing:.16em;}
      @keyframes lqp-spin{to{transform:rotate(360deg);}}
      @keyframes lqp-breathe{0%,100%{opacity:.85;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
      @keyframes lqp-slide{0%{left:-40%;}100%{left:100%;}}
    </style>
  </head>
  <body>
    <div id="root">
      <!--prerender:start-->
      <div id="lq-preboot">
        <div class="lqp-glow"></div>
        <div class="lqp-wrap">
          <div class="lqp-emblem">
            <span class="lqp-ring"></span>
            <span class="lqp-ring2"></span>
            <span class="lqp-logo"><img src="/logo.png" alt="LuxQuant" /></span>
          </div>
          <div class="lqp-txt">
            <span class="lqp-word">LuxQuant</span>
            <span class="lqp-bar"><span></span></span>
            <span class="lqp-label">Loading LuxQuant…</span>
          </div>
        </div>
      </div>
      <!--prerender:end-->
    </div>

    <!-- Three.js Globe Dependencies — defer: tetap eksekusi sebelum React app (module scripts always run after deferred scripts) -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script defer src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script defer src="https://unpkg.com/three-globe@2.24.4/dist/three-globe.min.js"></script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
